approach:
  - Endpoint: server/api/schema.get.ts
  - Flow: check SQLite cache → if stale/missing, query PostgreSQL via listSchema() → write cache → return.
  - TTL: 5 min if isLocalhost(), 4 hours otherwise. Parse updated_at timestamp.
  - On DB error: return stale cache if available, else { tables: [] }.
  - TDD: Write e2e test first creating tables with known columns, then implement endpoint.
