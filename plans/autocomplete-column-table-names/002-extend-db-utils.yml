approach:
  - listSchema() query: SELECT t.table_schema, t.table_name, c.column_name 
    FROM information_schema.tables t 
    LEFT JOIN information_schema.columns c ON t.table_schema = c.table_schema AND t.table_name = c.table_name 
    WHERE t.table_schema = 'public' AND t.table_type IN ('BASE TABLE', 'VIEW') 
    ORDER BY t.table_name, c.ordinal_position;
    Group results by table in code to build columns arrays.
  - isLocalhost extension: add || host.endsWith('.local') to existing check.
  - TDD: Write listSchema test in 003 (e2e level) since db.ts is a utility.
