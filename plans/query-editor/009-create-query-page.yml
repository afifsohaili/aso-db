status: completed
summary: Create /query page and update navigation
references:
  - file: apps/db/app/pages/query.vue
  - file: apps/db/test/e2e/query-page.spec.ts
  - file: apps/db/app/pages/overview.vue
  - file: apps/db/test/e2e/navigation.spec.ts
approach:
  - >
    Created apps/db/app/pages/query.vue
  - >
    Page layout: full-height flex container with three panes: Left sidebar (QueryHistorySidebar, 256px); Center (QueryEditor); Right/results area (QueryResults, 1/3 width)
  - >
    State management: sqlContent ref bound to editor; results ref; loading boolean; useFetch for savedQueries, history, and session on mount
  - >
    Auto-save session via useDebounceFn from @vueuse/core (500ms) watching sqlContent changes; PUT /api/query/session
  - >
    Execution flow: runAll() -> POST /api/query/execute; runSelected() -> same endpoint with selectedSql from editor ref; On success, set results and refresh history
  - >
    Navigation: Added a header nav bar inside pages/query.vue with NuxtLink to /overview and /query. Kept default.vue untouched because pages provide their own headers in this codebase.
  - >
    Created e2e tests in apps/db/test/e2e/query-page.spec.ts
  - >
    Tests verify /query loads, query execution, saved query listing, and session read/write
  - >
    Deviation from plan: Added sequence.concurrent = false to the e2e project in vitest.config.ts to prevent SQLite database lock contention when multiple e2e test files start Nitro servers in parallel
