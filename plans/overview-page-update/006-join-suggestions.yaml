approach:
  - Create new component: JoinSuggestions.vue
    - Props: schema (string), name (string)
    - Fetches from /api/tables/{schema}/{name}/relations on mount
    - Displays "joins:" label followed by list of related table buttons
    - Shows table names as clickable buttons (UiButton)
    - Clicking a button navigates to /join/{schema}/{name}/{targetSchema}/{targetTable}
